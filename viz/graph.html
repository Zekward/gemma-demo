<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<style>
 :root{--p:#1a1a1a;--s:#555;--m:#8a8a8a;--bd:#e0e0e0;--bg:#fafafa;--s1:#fff;

 svg{display:block;width:100%}text{font-family:inherit}
</style></head><body>
<header><h1>SpaceX $25B senior notes — contrastive bond graph</h1>
<p>Real EDGAR filings, week of 2026-06-22. Click an edge to see what differs between near-identical nodes; drag nodes; click a node for its fields.</p></header>
<div class="wrap"><div class="pane" id="gp"><svg id="g" viewBox="0 0 770 470"></svg></div><div class="pane" id="ip"></div></div>
<script>
const GRAPH={"nodes":[{"id":"ISS-SPCX","label":"Issuer","props":{"name":"Space Exploration Technologies Corp","cik":"1181412","ticker":"SPCX"},"x":95,"y":250},{"id":"8K-LAUNCH","label":"Filing","props":{"doc_type":"8-K","stage":"launch","date":"2026-06-22","title":"Launch of senior notes","url":"https://www.sec.gov/Archives/edgar/data/1181412/000162828026044489/spcx8-kxlaunchseniornotes.htm"},"x":160,"y":55},{"id":"8K-PRICING","label":"Filing","props":{"doc_type":"8-K","stage":"priced","date":"2026-06-23","title":"Pricing","url":"https://www.sec.gov/Archives/edgar/data/1181412/000162828026044955/spcx-pricing8xk.htm"},"x":345,"y":55},{"id":"8K-CLOSING","label":"Filing","props":{"doc_type":"8-K","stage":"closed","date":"2026-06-26","title":"Closing + indenture","url":"https://www.sec.gov/Archives/edgar/data/1181412/000162828026045763/spcx-closing8xkjune2026.htm"},"x":525,"y":55},{"id":"IND-SPCX","label":"Indenture","props":{"exhibit":"EX-4.1","trustee":"The Bank of New York Mellon Trust Company, N.A.","bytes":925667,"url":"https://www.sec.gov/Archives/edgar/data/1181412/000162828026045763/exhibit41-closing8xkjune20.htm"},"x":520,"y":215},{"id":"SPCX-2031","label":"Tranche","props":{"series":"2031 Notes","coupon_pct":5.35,"maturity":2031,"principal_usd":7000000000,"seniority":"senior","cusip":null,"cusip_status":"144A \u2014 not in EDGAR"},"x":695,"y":70},{"id":"SPCX-2033","label":"Tranche","props":{"series":"2033 Notes","coupon_pct":5.65,"maturity":2033,"principal_usd":6000000000,"seniority":"senior","cusip":null,"cusip_status":"144A \u2014 not in EDGAR"},"x":695,"y":150},{"id":"SPCX-2036","label":"Tranche","props":{"series":"2036 Notes","coupon_pct":5.875,"maturity":2036,"principal_usd":6000000000,"seniority":"senior","cusip":null,"cusip_status":"144A \u2014 not in EDGAR"},"x":695,"y":230},{"id":"SPCX-2046","label":"Tranche","props":{"series":"2046 Notes","coupon_pct":6.6,"maturity":2046,"principal_usd":2500000000,"seniority":"senior","cusip":null,"cusip_status":"144A \u2014 not in EDGAR"},"x":695,"y":310},{"id":"SPCX-2056","label":"Tranche","props":{"series":"2056 Notes","coupon_pct":6.65,"maturity":2056,"principal_usd":3500000000,"seniority":"senior","cusip":null,"cusip_status":"144A \u2014 not in EDGAR"},"x":695,"y":390}],"links":[{"src":"ISS-SPCX","dst":"SPCX-2031","type":"ISSUER_OF","props":{"relationship":"issuer_of","differences":[],"identical_fields":[],"materiality":0.0,"summary":"issuer of the tranche"}},{"src":"IND-SPCX","dst":"SPCX-2031","type":"GOVERNS","props":{"relationship":"governed_by","differences":[],"identical_fields":[],"materiality":0.0,"summary":"tranche governed by this indenture"}},{"src":"ISS-SPCX","dst":"SPCX-2033","type":"ISSUER_OF","props":{"relationship":"issuer_of","differences":[],"identical_fields":[],"materiality":0.0,"summary":"issuer of the tranche"}},{"src":"IND-SPCX","dst":"SPCX-2033","type":"GOVERNS","props":{"relationship":"governed_by","differences":[],"identical_fields":[],"materiality":0.0,"summary":"tranche governed by this indenture"}},{"src":"ISS-SPCX","dst":"SPCX-2036","type":"ISSUER_OF","props":{"relationship":"issuer_of","differences":[],"identical_fields":[],"materiality":0.0,"summary":"issuer of the tranche"}},{"src":"IND-SPCX","dst":"SPCX-2036","type":"GOVERNS","props":{"relationship":"governed_by","differences":[],"identical_fields":[],"materiality":0.0,"summary":"tranche governed by this indenture"}},{"src":"ISS-SPCX","dst":"SPCX-2046","type":"ISSUER_OF","props":{"relationship":"issuer_of","differences":[],"identical_fields":[],"materiality":0.0,"summary":"issuer of the tranche"}},{"src":"IND-SPCX","dst":"SPCX-2046","type":"GOVERNS","props":{"relationship":"governed_by","differences":[],"identical_fields":[],"materiality":0.0,"summary":"tranche governed by this indenture"}},{"src":"ISS-SPCX","dst":"SPCX-2056","type":"ISSUER_OF","props":{"relationship":"issuer_of","differences":[],"identical_fields":[],"materiality":0.0,"summary":"issuer of the tranche"}},{"src":"IND-SPCX","dst":"SPCX-2056","type":"GOVERNS","props":{"relationship":"governed_by","differences":[],"identical_fields":[],"materiality":0.0,"summary":"tranche governed by this indenture"}},{"src":"8K-CLOSING","dst":"IND-SPCX","type":"CONTAINS","props":{"relationship":"contains","differences":[],"identical_fields":[],"materiality":0.2,"summary":"closing 8-K attaches the indenture (EX-4.1)"}},{"src":"8K-LAUNCH","dst":"8K-PRICING","type":"SUPERSEDES","props":{"relationship":"supersedes","differences":[{"field":"coupons","a":"(none \u2014 intent only)","b":"5.350 / 5.650 / 5.875 / 6.600 / 6.650 %","why_it_matters":"the economics are now fixed"},{"field":"tranche_sizes","a":"(none)","b":"$7.0 / $6.0 / $6.0 / $2.5 / $3.5 B","why_it_matters":"deal size & allocation set"}],"identical_fields":["issuer","deal","security_type=senior notes"],"materiality":0.9,"summary":"Pricing 8-K turns the launch announcement into priced terms."}},{"src":"8K-PRICING","dst":"8K-CLOSING","type":"SUPERSEDES","props":{"relationship":"supersedes","differences":[{"field":"indenture","a":"absent","b":"present (EX-4.1, 904 KB)","why_it_matters":"the binding legal contract now exists"},{"field":"trustee","a":"(none)","b":"BNY Mellon Trust Co., N.A.","why_it_matters":"trustee identified"},{"field":"redemption","a":"(none)","b":"make-whole + par call","why_it_matters":"call mechanics defined"}],"identical_fields":["coupons","tranche_sizes","issuer"],"materiality":0.85,"summary":"Closing 8-K executes the contract: indenture, trustee, redemption terms appear."}},{"src":"SPCX-2031","dst":"SPCX-2033","type":"SIBLING_TRANCHE","props":{"relationship":"sibling_tranche","differences":[{"field":"coupon","a":"5.350%","b":"5.650%","why_it_matters":"+30.0 bp for 2 yrs more duration"},{"field":"maturity","a":2031,"b":2033,"why_it_matters":"further out the curve"},{"field":"principal","a":"$7.0B","b":"$6.0B","why_it_matters":"different tranche size"}],"identical_fields":["issuer","indenture","seniority=senior","currency=USD"],"materiality":0.6,"summary":"Same indenture & seniority; 2031->2033 steps up the maturity ladder."}},{"src":"SPCX-2033","dst":"SPCX-2036","type":"SIBLING_TRANCHE","props":{"relationship":"sibling_tranche","differences":[{"field":"coupon","a":"5.650%","b":"5.875%","why_it_matters":"+22.5 bp for 3 yrs more duration"},{"field":"maturity","a":2033,"b":2036,"why_it_matters":"further out the curve"},{"field":"principal","a":"$6.0B","b":"$6.0B","why_it_matters":"different tranche size"}],"identical_fields":["issuer","indenture","seniority=senior","currency=USD"],"materiality":0.6,"summary":"Same indenture & seniority; 2033->2036 steps up the maturity ladder."}},{"src":"SPCX-2036","dst":"SPCX-2046","type":"SIBLING_TRANCHE","props":{"relationship":"sibling_tranche","differences":[{"field":"coupon","a":"5.875%","b":"6.600%","why_it_matters":"+72.5 bp for 10 yrs more duration"},{"field":"maturity","a":2036,"b":2046,"why_it_matters":"further out the curve"},{"field":"principal","a":"$6.0B","b":"$2.5B","why_it_matters":"different tranche size"}],"identical_fields":["issuer","indenture","seniority=senior","currency=USD"],"materiality":0.6,"summary":"Same indenture & seniority; 2036->2046 steps up the maturity ladder."}},{"src":"SPCX-2046","dst":"SPCX-2056","type":"SIBLING_TRANCHE","props":{"relationship":"sibling_tranche","differences":[{"field":"coupon","a":"6.600%","b":"6.650%","why_it_matters":"+5.0 bp for 10 yrs more duration"},{"field":"maturity","a":2046,"b":2056,"why_it_matters":"further out the curve"},{"field":"principal","a":"$2.5B","b":"$3.5B","why_it_matters":"different tranche size"}],"identical_fields":["issuer","indenture","seniority=senior","currency=USD"],"materiality":0.6,"summary":"Same indenture & seniority; 2046->2056 steps up the maturity ladder."}}]};
const CSS=getComputedStyle(document.documentElement),V=k=>CSS.getPropertyValue('--'+k).trim();
const C={Issuer:V('Issuer'),Filing:V('Filing'),Indenture:V('Indenture'),Tranche:V('Tranche')};
const ES={SUPERSEDES:[V('sup'),3,''],SIBLING_TRANCHE:[V('sib'),2,'5 4'],ISSUER_OF:[V('m'),1,''],GOVERNS:[V('m'),1,'2 3'],CONTAINS:[V('Indenture'),2,'']};
const R={Issuer:19,Filing:17,Indenture:24,Tranche:15};
const idx={};GRAPH.nodes.forEach(n=>idx[n.id]=n);
const svg=document.getElementById('g'),NS='http://www.w3.org/2000/svg';
const E=(t,a)=>{const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;};
// simple force relax around the seeded positions (keeps layout but de-overlaps)
let nodes=GRAPH.nodes.map(n=>({...n,vx:0,vy:0}));
const NI={};nodes.forEach((n,i)=>NI[n.id]=i);
function step(){for(let i=0;i<nodes.length;i++){let a=nodes[i];for(let j=i+1;j<nodes.length;j++){let b=nodes[j],dx=a.x-b.x,dy=a.y-b.y,d=Math.hypot(dx,dy)||1,f=900/(d*d);a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;}}
 GRAPH.links.forEach(l=>{let a=nodes[NI[l.src]],b=nodes[NI[l.dst]],dx=b.x-a.x,dy=b.y-a.y,d=Math.hypot(dx,dy)||1,f=(d-120)*0.01;a.vx+=dx/d*f;a.vy+=dy/d*f;b.vx-=dx/d*f;b.vy-=dy/d*f;});
 nodes.forEach(n=>{n.x+=n.vx*0.5;n.y+=n.vy*0.5;n.vx*=0.8;n.vy*=0.8;n.x=Math.max(30,Math.min(740,n.x));n.y=Math.max(30,Math.min(440,n.y));});}
for(let i=0;i<140;i++)step();
nodes.forEach(n=>{idx[n.id].x=n.x;idx[n.id].y=n.y;});
// draw
const linkEls=[];
GRAPH.links.forEach((l,i)=>{const A=idx[l.src],B=idx[l.dst],st=ES[l.type],rich=(l.props.differences||[]).length;
 const hit=E('line',{x1:A.x,y1:A.y,x2:B.x,y2:B.y,stroke:'transparent','stroke-width':14,style:rich?'cursor:pointer':''});
 const ln=E('line',{x1:A.x,y1:A.y,x2:B.x,y2:B.y,stroke:st[0],'stroke-width':st[1],'stroke-dasharray':st[2],opacity:rich?0.95:0.45});
 hit.onclick=()=>{if(rich)showEdge(l,ln);};svg.appendChild(ln);svg.appendChild(hit);l._ln=ln;linkEls.push(ln);});
GRAPH.nodes.forEach(n=>{const g=E('g',{style:'cursor:pointer'});const c=E('circle',{cx:n.x,cy:n.y,r:R[n.label],fill:C[n.label],stroke:V('s1'),'stroke-width':2});
 const tx=E('text',{x:n.x,y:n.y+R[n.label]+12,'text-anchor':'middle','font-size':11,fill:V('s')});tx.textContent=n.id.replace('SPCX-','').replace('8K-','8-K ').replace('ISS-SPCX','SpaceX').replace('IND-SPCX','Indenture');
 g.appendChild(c);g.appendChild(tx);g.onclick=()=>showNode(n,c);svg.appendChild(g);n._c=c;});
function clr(){GRAPH.nodes.forEach(n=>{n._c.setAttribute('stroke',V('s1'));n._c.setAttribute('stroke-width',2);});GRAPH.links.forEach(l=>{const st=ES[l.type];l._ln.setAttribute('stroke-width',st[1]);l._ln.setAttribute('opacity',(l.props.differences||[]).length?0.95:0.45);});}
const ip=document.getElementById('ip');
function row(k,v){return '<tr><td style="color:var(--m);padding:3px 8px 3px 0;vertical-align:top;white-space:nowrap">'+k+'</td><td style="padding:3px 0">'+v+'</td></tr>';}
function showNode(n,c){clr();c.setAttribute('stroke',C[n.label]);c.setAttribute('stroke-width',3.5);
 let h='<div style="font-weight:500;font-size:15px">'+n.id+'</div><div style="color:var(--m);margin:2px 0 8px">'+n.label+'</div><table style="border-collapse:collapse;width:100%">';
 for(const k in n.props)h+=row(k,n.props[k]==null?'—':n.props[k]);ip.innerHTML=h+'</table>';}
function showEdge(l,ln){clr();ln.setAttribute('stroke-width',ES[l.type][1]+2);ln.setAttribute('opacity',1);[l.src,l.dst].forEach(id=>{idx[id]._c.setAttribute('stroke',C[idx[id].label]);idx[id]._c.setAttribute('stroke-width',3.5);});
 const p=l.props;let h='<div style="font-weight:500;font-size:15px">Contrastive diff</div><div style="color:var(--m);margin:2px 0">'+l.type+' · '+l.src+' → '+l.dst+'</div><div style="color:var(--s);font-style:italic;margin:6px 0 10px">'+p.summary+'</div>';
 if(p.identical_fields.length){h+='<div style="color:var(--m);font-size:12px">identical (the look-alike part):</div><div style="margin:3px 0 10px;color:var(--s)">'+p.identical_fields.join(' · ')+'</div>';}
 h+='<div style="color:var(--m);font-size:12px;margin-bottom:4px">differences:</div><table style="border-collapse:collapse;width:100%;font-size:13px"><tr style="color:var(--m)"><td>field</td><td>A</td><td>B</td></tr>';
 p.differences.forEach(d=>{h+='<tr style="border-top:1px solid var(--bd)"><td style="padding:5px 6px 5px 0">'+d.field+'</td><td style="padding:5px 6px 5px 0;color:var(--s)">'+d.a+'</td><td style="padding:5px 6px 5px 0">'+d.b+'</td></tr><tr><td></td><td colspan="2" style="color:var(--Tranche);font-size:12px;padding-bottom:6px">↳ '+d.why_it_matters+'</td></tr>';});
 ip.innerHTML=h+'</table>';}
ip.innerHTML='<div style="font-weight:500;font-size:15px">Click an edge to see a diff</div><div style="color:var(--s);margin-top:6px">Orange = SUPERSEDES (deal lifecycle). Blue dashed = SIBLING_TRANCHE (maturity ladder). Grey = structural. Both carry the agent-extracted delta payload.</div>';
</script></body></html>
